name: Pasted
options:
  bundleIdPrefix: org.pasted
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: org.pasted.app
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  Pasted:
    type: application
    platform: macOS
    sources:
      - path: Pasted
        excludes:
          - "Pasted.entitlements"
          - "Info.plist"
          - "Resources/.gitkeep"
    resources:
      - path: Pasted/Resources
        excludes:
          - ".gitkeep"
    settings:
      base:
        INFOPLIST_FILE: Pasted/Info.plist
        CODE_SIGN_ENTITLEMENTS: Pasted/Pasted.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        PRODUCT_NAME: Pasted
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Pasted/Pasted.entitlements
    info:
      path: Pasted/Info.plist
    dependencies: []

  PastedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PastedTests
    dependencies:
      - target: Pasted
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pasted.app/Contents/MacOS/Pasted"
